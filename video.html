<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --neon-pink: #ff007a; 
            --bg-dark: #0a0b10; 
            --neon-green: #39ff14; 
        }
        
        body { 
            margin: 0; 
            font-family: 'Exo 2', sans-serif; 
            background: var(--bg-dark); 
            color: white; 
            line-height: 1.6; 
        }

        nav { 
            display: flex; 
            justify-content: space-around; 
            padding: 20px; 
            background: rgba(0,0,0,0.9); 
            border-bottom: 2px solid var(--neon-blue); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }

        nav a { 
            color: white; 
            text-decoration: none; 
            font-weight: bold; 
            text-transform: uppercase; 
            transition: 0.3s; 
        }

        nav a:hover { 
            color: var(--neon-blue); 
            text-shadow: 0 0 10px var(--neon-blue); 
        }

        .container { 
            max-width: 1200px; 
            margin: 40px auto; 
            padding: 25px; 
        }

        h1 { 
            text-align: center; 
            font-family: 'Orbitron'; 
            color: var(--neon-blue); 
            text-shadow: 0 0 15px var(--neon-blue);
            margin-bottom: 40px;
        }

        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); 
            gap: 30px; 
        }

        @media (max-width: 500px) {
            .video-grid { grid-template-columns: 1fr; }
        }

        .video-card { 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 15px; 
            padding: 20px; 
            transition: 0.4s;
            border: 1px solid rgba(0, 242, 255, 0.3);
        }

        .video-card:hover { 
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.2);
            border-color: var(--neon-blue);
        }

        .video-card h3 {
            margin-top: 0;
            font-size: 1.1rem;
            color: var(--neon-pink);
            border-left: 4px solid var(--neon-pink);
            padding-left: 15px;
            min-height: 2.2rem;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            background: #000;
            margin-top: 15px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .category-label {
            display: inline-block;
            background: var(--neon-blue);
            color: black;
            padding: 2px 10px;
            border-radius: 5px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Басты бет</a>
    <a href="theory.html">Тақырып түсіндіру</a>
    <a href="video.html">Видеосабақтар</a>
    <a href="test.html">Білімді тексеру</a>
    <a href="contact.html">Байланыс</a>
</nav>

<div class="container">
    <h1>Видеосабақтар мұрағаты</h1>

    <div class="video-grid">
        <div class="video-card">
            <div class="category-label">Теория</div>
            <h3>For циклін түсіндіру</h3>
            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube.com/embed/0gS_y7MDWZw" 
                    title="Теория: For циклін түсіндіру" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>

        <div class="video-card">
            <div class="category-label" style="background: var(--neon-green);">Практика</div>
            <h3>For цикліне есептер шығару</h3>
            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube.com/embed/reG4upLObqs" 
                    title="Практика: For цикліне есептер шығару" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>

        <div class="video-card">
            <div class="category-label">Теория</div>
            <h3>Else-ті түсіндіру</h3>
            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube.com/embed/_jreu6Y8yAk" 
                    title="Теория: Else ті түсіндіру" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>

        <div class="video-card">
            <div class="category-label" style="background: var(--neon-green);">Практика</div>
            <h3>Else тақырыбына есептер</h3>
            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube.com/embed/R2pi46Vjp5M" 
                    title="Практика: Else тақырыбына есептер" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>
    </div>
</div>

</body>
</html>
